spring.application.name=pedidos
# El puerto donde correrá este microservicio
server.port=8082

# Configuración de conexión a la base de datos MySQL local
# Nota: pedidos_db es el nombre de la base de datos, ˇla creará automáticamente si no existe!
spring.datasource.url=jdbc:mysql://localhost:3307/pedidos_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate (Generación automática de tablas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true