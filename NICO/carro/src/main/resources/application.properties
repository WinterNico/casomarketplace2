# ===============================
# 1. IDENTIFICACIÓN Y PUERTO
# ===============================
spring.application.name=carro
# ˇMuy importante! Cada microservicio DEBE tener un puerto distinto.
# Si el inventario está en el 8082, pongamos el carrito en el 8083.
server.port=8083

# ===============================
# 2. CONEXIÓN A BASE DE DATOS (MySQL)
# ===============================
# Cambia "carro_db", "root" y tu contraseńa por los datos reales de tu base de datos local
spring.datasource.url=jdbc:mysql://localhost:3307/carro_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 3. CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# Muestra las consultas SQL en la consola (súper útil para encontrar errores)
spring.jpa.show-sql=true
# Como tienes Flyway, le decimos a Hibernate que NO cree ni modifique las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# 4. CONFIGURACIÓN DE FLYWAY (Opcional por ahora)
# ===============================
# Si aún no vas a usar Flyway, puedes cambiar esto a "false" o borrarlo
spring.flyway.enabled=false
