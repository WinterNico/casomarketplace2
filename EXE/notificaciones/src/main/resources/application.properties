spring.application.name=notificaciones
server.port=9094

# 1. Credenciales y URL
spring.datasource.url=jdbc:mysql://localhost:3306/marketplace_notificaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
# (Ojo: Si tu XAMPP tiene contraseńa, ponla arriba. Por defecto en XAMPP suele ir vacía)

# 2. Forzamos el Driver y el Dialecto para que Spring no se confunda
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. Comportamiento de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true