spring.application.name=usuarios
server.port=9091
# Nombre de tu microservicio

# Conexión a tu base de datos (asegúrate de que db_usuarios exista en tu XAMPP/Laragon)
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuarios?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Esta es la magia: actualiza las tablas automáticamente según tus Entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false