spring.application.name=usuarios
server.port=9091

# Conexion a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuarios?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Actualiza la tabla a base de entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Crea las tablas al prender (para las PC's del duoc por ejemplo sirve)
spring.jpa.defer-datasource-initialization=true