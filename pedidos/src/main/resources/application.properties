spring.application.name=pedidos
# El puerto donde correra este microservicio
server.port=8082

# Configuracion de conexion a la base de datos MySQL local

spring.datasource.url=jdbc:mysql://localhost:3306/pedidos_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Configuracion de JPA / Hibernate (Generacion automatica de tablas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.instance.prefer-ip-address=true